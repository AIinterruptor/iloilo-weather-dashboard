<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iloilo Weather — Jul 5–11</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Ambient background layers ── */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: 0;
      background:
        radial-gradient(60% 50% at 50% 0%, #1e293b 0%, transparent 70%),
        linear-gradient(180deg, #111c30 0%, #0f172a 60%, #0b1120 100%);
      animation: sky-drift 26s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(70% 55% at 50% 12%, rgba(186,205,255,0.10), transparent 65%);
      opacity: 0;
      animation: lightning-flash 9s steps(1, end) infinite;
    }

    @keyframes sky-drift {
      from { transform: translateY(0)   scale(1.00); filter: brightness(1.00); }
      to   { transform: translateY(-2%) scale(1.04); filter: brightness(1.08); }
    }

    @keyframes lightning-flash {
      0%, 100%  { opacity: 0; }
      3%        { opacity: 0.9; }
      4%        { opacity: 0.15; }
      5%        { opacity: 0.75; }
      6%        { opacity: 0; }
      46%       { opacity: 0; }
      47%       { opacity: 0.65; }
      48.5%     { opacity: 0; }
    }

    /* ── Layout ── */
    header, .grid, footer { position: relative; z-index: 1; }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: title-in 700ms cubic-bezier(0.22,1,0.36,1) 120ms forwards;
    }

    header p.location {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-top: 4px;
      opacity: 0;
      animation: title-in 700ms ease 260ms forwards;
    }

    header p.updated {
      font-size: 0.8rem;
      color: #475569;
      margin-top: 6px;
      opacity: 0;
      animation: title-in 700ms ease 360ms forwards;
    }

    .season-badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      margin-top: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      animation:
        title-in 600ms ease 480ms forwards,
        badge-breathe 3.6s ease-in-out 1100ms infinite;
    }

    @keyframes title-in {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes badge-breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(96,165,250,0.0); }
      50%      { box-shadow: 0 0 14px 1px rgba(96,165,250,0.35); }
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Cards ── */
    .card {
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: card-in 560ms cubic-bezier(0.22,1,0.36,1) forwards;
      animation-delay: calc(var(--i) * 80ms);
      transition:
        transform 0.28s cubic-bezier(0.22,1,0.36,1),
        box-shadow 0.28s ease,
        border-color 0.28s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card:hover {
      transform: translateY(-6px) scale(1.025);
      border-color: rgba(125,211,252,0.35);
      box-shadow:
        0 18px 36px -12px rgba(0,0,0,0.55),
        0 0 24px -6px rgba(56,189,248,0.25);
    }

    .card:hover .rain-layer { opacity: calc(var(--rain-opacity, 0.25) + 0.12); }
    .card:hover .icon-glyph { animation-duration: 3.2s, 5s; }
    .card:hover .temp-max {
      transition: text-shadow 0.28s ease;
      text-shadow: 0 0 14px rgba(251,191,36,0.5);
    }

    /* Rain probability color bands */
    .rain-low    { background: linear-gradient(145deg, #14532d, #166534); }
    .rain-medium { background: linear-gradient(145deg, #713f12, #78350f); }
    .rain-high   { background: linear-gradient(145deg, #7f1d1d, #991b1b); }
    .rain-none   { background: linear-gradient(145deg, #1e3a5f, #1e40af22); }

    /* ── Rain layer ── */
    .rain-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: var(--rain-opacity, 0.25);
      background-image:
        repeating-linear-gradient(105deg,
          transparent 0, transparent calc(var(--rain-gap, 6px) - 1px),
          rgba(186,212,255,0.55) calc(var(--rain-gap, 6px) - 1px), rgba(186,212,255,0.55) var(--rain-gap, 6px)),
        repeating-linear-gradient(102deg,
          transparent 0, transparent calc(var(--rain-gap, 6px) * 1.7),
          rgba(160,190,235,0.35) calc(var(--rain-gap, 6px) * 1.7), rgba(160,190,235,0.35) calc(calc(var(--rain-gap, 6px) * 1.7) + 1px));
      background-size: 100% 220px, 100% 340px;
      animation:
        rain-fall var(--rain-speed, 0.7s) linear infinite,
        rain-fall-back calc(var(--rain-speed, 0.7s) * 1.6) linear infinite;
      transition: opacity 0.28s ease;
    }

    @keyframes rain-fall {
      from { background-position: 0 0,        0 0; }
      to   { background-position: -60px 220px, 0 0; }
    }

    @keyframes rain-fall-back {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 0 0, -30px 340px; }
    }

    /* ── Card content (above rain layer) ── */
    .card-date, .card-dow, .card-icon, .card-condition,
    .card-temps, .card-stats { position: relative; z-index: 1; }

    .card-date {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
    }

    .card-dow {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f8fafc;
    }

    /* ── Weather icon ── */
    .card-icon {
      font-size: 2.4rem;
      line-height: 1;
      position: relative;
      display: inline-block;
      width: max-content;
    }

    .icon-glyph {
      display: inline-block;
      transform-origin: 50% 70%;
      animation: icon-sway 4.2s ease-in-out infinite, icon-jolt 7s ease-in-out infinite;
      animation-delay: calc(var(--i) * -0.9s), calc(var(--i) * -0.9s);
    }

    .card-icon::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(125,211,252,0.45), transparent 60%);
      opacity: 0;
      z-index: -1;
      animation: icon-glow 7s ease-in-out infinite;
      animation-delay: calc(var(--i) * -0.9s);
    }

    @keyframes icon-sway {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50%      { transform: rotate(3deg) translateY(-1px); }
    }

    @keyframes icon-jolt {
      0%, 86%, 100% { transform: translateX(0); }
      88%  { transform: translateX(-2px) rotate(-1deg); }
      90%  { transform: translateX(2px) rotate(1deg); }
      92%  { transform: translateX(-1px); }
      94%  { transform: translateX(0); }
    }

    @keyframes icon-glow {
      0%, 84%, 100% { opacity: 0; transform: scale(0.9); }
      89%           { opacity: 1; transform: scale(1.15); }
      96%           { opacity: 0; transform: scale(0.95); }
    }

    .card-condition {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .card-temps {
      display: flex;
      gap: 12px;
      align-items: baseline;
    }

    .temp-max { font-size: 1.6rem; font-weight: 700; color: #fbbf24; }
    .temp-min { font-size: 1.1rem; color: #93c5fd; }

    /* ── Stats grid ── */
    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      margin-top: 4px;
    }

    .stat { display: flex; flex-direction: column; gap: 1px; }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.4);
    }

    .stat-value { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }

    .rain-pct  { color: #7dd3fc; }
    .uv-low    { color: #86efac; }
    .uv-mod    { color: #fde047; }
    .uv-high   { color: #fb923c; }
    .uv-vhigh  { color: #f87171; }
    .uv-ext    { color: #e879f9; }

    /* ── Wind dial ── */
    .wind-dial { display: flex; align-items: center; gap: 5px; }

    .wind-arrow {
      display: inline-block;
      font-size: 1rem;
      line-height: 1;
      color: #7dd3fc;
      transform: rotate(var(--wind-deg, 45deg));
      transform-origin: 50% 50%;
      animation: wind-gust var(--wind-pulse, 1.6s) ease-in-out infinite;
    }

    @keyframes wind-gust {
      0%, 100% { opacity: 0.65; }
      50%      { opacity: 1; transform: rotate(var(--wind-deg, 45deg)) translateY(-2px); }
    }

    /* ── Misc ── */
    .no-data {
      text-align: center;
      color: #475569;
      padding: 60px 0;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      margin-top: 36px;
      font-size: 0.75rem;
      color: #334155;
      position: relative;
      z-index: 1;
    }

    footer a { color: #475569; text-decoration: none; }
    footer a:hover { color: #64748b; }

    /* ── prefers-reduced-motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        animation-delay: 0ms !important;
        transition-duration: 0.001ms !important;
      }
      .card,
      header h1, header .location, header .updated, .season-badge {
        opacity: 1 !important;
        transform: none !important;
      }
      .rain-layer    { opacity: var(--rain-opacity, 0.22) !important; }
      body::after    { opacity: 0 !important; }
      .icon-glyph    { transform: none !important; }
      .card-icon::after { opacity: 0 !important; }
      .wind-arrow    { transform: rotate(var(--wind-deg, 45deg)) !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌧️ Iloilo Weather Forecast</h1>
  <p class="location" id="location">—</p>
  <p class="updated" id="updated">Loading…</p>
  <span class="season-badge">☁️ Habagat Season</span>
</header>

<div class="grid" id="grid">
  <div class="no-data">Loading forecast data…</div>
</div>

<footer>
  <p>Data: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Updated daily at 06:00 PHT via GitHub Actions</p>
</footer>

<script>
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const DIRS = {
  N:0, NNE:22.5, NE:45, ENE:67.5, E:90, ESE:112.5, SE:135, SSE:157.5,
  S:180, SSW:202.5, SW:225, WSW:247.5, W:270, WNW:292.5, NW:315, NNW:337.5
};

function rainClass(pct) {
  if (pct == null) return 'rain-none';
  if (pct >= 70) return 'rain-high';
  if (pct >= 40) return 'rain-medium';
  if (pct >= 10) return 'rain-low';
  return 'rain-none';
}

function uvClass(label) {
  return { Low:'uv-low', Moderate:'uv-mod', High:'uv-high', 'Very High':'uv-vhigh', Extreme:'uv-ext' }[label] || '';
}

function fmt(val, suffix, fallback='—') {
  return (val != null) ? `${val}${suffix}` : fallback;
}

fetch('forecast.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('location').textContent = data.location || '';
    document.getElementById('updated').textContent = data.generated
      ? `Last updated: ${data.generated}` : '';

    const grid = document.getElementById('grid');

    if (!data.days || data.days.length === 0) {
      grid.innerHTML = '<div class="no-data">No forecast data available yet. Check back after 06:00 PHT.</div>';
      return;
    }

    grid.innerHTML = '';

    data.days.forEach((d, i) => {
      const date = new Date(d.date + 'T00:00:00+08:00');
      const dow = DAYS[date.getDay()];
      const dateLabel = date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
      const uvc = uvClass(d.uv_label);

      // Data-driven rain animation params (map 93–100 window)
      const intensity = Math.max(0, Math.min(1, ((d.rain_chance || 0) - 93) / 7));
      const rainOpacity = (0.16 + intensity * 0.22).toFixed(3);
      const rainSpeed   = (0.85 - intensity * 0.35).toFixed(3);
      const rainGap     = (7 - intensity * 3).toFixed(1);

      // Wind dial
      const towardDeg = ((DIRS[d.wind_dir] || 0) + 180) % 360;
      const windPulse = Math.max(0.9, 2.4 - ((d.wind_speed || 0) / 40) * 1.5).toFixed(2);

      const card = document.createElement('div');
      card.className = `card ${rainClass(d.rain_chance)}`;
      card.style.setProperty('--i', i);
      card.style.setProperty('--rain-opacity', rainOpacity);
      card.style.setProperty('--rain-speed', rainSpeed + 's');
      card.style.setProperty('--rain-gap', rainGap + 'px');
      card.style.setProperty('--wind-deg', towardDeg + 'deg');
      card.style.setProperty('--wind-pulse', windPulse + 's');

      card.innerHTML = `
        <div aria-hidden="true" class="rain-layer"></div>
        <div>
          <div class="card-date">${dateLabel}</div>
          <div class="card-dow">${dow}</div>
        </div>
        <div class="card-icon">
          <span class="icon-glyph">${d.icon || '❓'}</span>
        </div>
        <div class="card-condition">${d.condition || '—'}</div>
        <div class="card-temps">
          <span class="temp-max">${fmt(d.temp_max, '°')}</span>
          <span class="temp-min">${fmt(d.temp_min, '°')}</span>
        </div>
        <div class="card-stats">
          <div class="stat">
            <span class="stat-label">Rain</span>
            <span class="stat-value rain-pct">${fmt(d.rain_chance, '%')}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Humidity</span>
            <span class="stat-value">${fmt(d.humidity_max, '%')}</span>
          </div>
          <div class="stat stat-wind">
            <span class="stat-label">Wind</span>
            <div class="wind-dial">
              <span class="wind-arrow" aria-hidden="true">↑</span>
              <span class="stat-value">${fmt(d.wind_speed, ' km/h')} ${d.wind_dir || ''}</span>
            </div>
          </div>
          <div class="stat">
            <span class="stat-label">UV</span>
            <span class="stat-value ${uvc}">${fmt(d.uv_index, '')} <small>${d.uv_label || ''}</small></span>
          </div>
        </div>`;

      grid.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div class="no-data">Could not load forecast.json — workflow may not have run yet.</div>';
    document.getElementById('updated').textContent = '';
  });
</script>
</body>
</html>
