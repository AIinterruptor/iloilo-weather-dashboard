<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iloilo Weather — Jul 5–11</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.01em;
    }

    header p.location {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    header p.updated {
      font-size: 0.8rem;
      color: #475569;
      margin-top: 6px;
    }

    .season-badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      margin-top: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-2px); }

    /* Rain probability color bands */
    .rain-low    { background: linear-gradient(145deg, #14532d, #166534); }
    .rain-medium { background: linear-gradient(145deg, #713f12, #78350f); }
    .rain-high   { background: linear-gradient(145deg, #7f1d1d, #991b1b); }
    .rain-none   { background: linear-gradient(145deg, #1e3a5f, #1e40af22); }

    .card-date {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
    }

    .card-dow {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .card-icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .card-condition {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .card-temps {
      display: flex;
      gap: 12px;
      align-items: baseline;
    }

    .temp-max {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fbbf24;
    }

    .temp-min {
      font-size: 1.1rem;
      color: #93c5fd;
    }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      margin-top: 4px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.4);
    }

    .stat-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .rain-pct { color: #7dd3fc; }
    .uv-low    { color: #86efac; }
    .uv-mod    { color: #fde047; }
    .uv-high   { color: #fb923c; }
    .uv-vhigh  { color: #f87171; }
    .uv-ext    { color: #e879f9; }

    .no-data {
      text-align: center;
      color: #475569;
      padding: 60px 0;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      margin-top: 36px;
      font-size: 0.75rem;
      color: #334155;
    }

    footer a { color: #475569; text-decoration: none; }
    footer a:hover { color: #64748b; }
  </style>
</head>
<body>

<header>
  <h1>🌧️ Iloilo Weather Forecast</h1>
  <p class="location" id="location">—</p>
  <p class="updated" id="updated">Loading…</p>
  <span class="season-badge">☁️ Habagat Season</span>
</header>

<div class="grid" id="grid">
  <div class="no-data">Loading forecast data…</div>
</div>

<footer>
  <p>Data: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Updated daily at 06:00 PHT via GitHub Actions</p>
</footer>

<script>
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function rainClass(pct) {
  if (pct === null || pct === undefined) return 'rain-none';
  if (pct >= 70) return 'rain-high';
  if (pct >= 40) return 'rain-medium';
  if (pct >= 10) return 'rain-low';
  return 'rain-none';
}

function uvClass(label) {
  const map = {
    'Low': 'uv-low', 'Moderate': 'uv-mod', 'High': 'uv-high',
    'Very High': 'uv-vhigh', 'Extreme': 'uv-ext'
  };
  return map[label] || '';
}

function fmt(val, suffix, fallback='—') {
  return (val !== null && val !== undefined) ? `${val}${suffix}` : fallback;
}

fetch('forecast.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('location').textContent = data.location || '';
    document.getElementById('updated').textContent = data.generated
      ? `Last updated: ${data.generated}` : '';

    const grid = document.getElementById('grid');

    if (!data.days || data.days.length === 0) {
      grid.innerHTML = '<div class="no-data">No forecast data available yet. Check back after 06:00 PHT.</div>';
      return;
    }

    grid.innerHTML = data.days.map(d => {
      const date = new Date(d.date + 'T00:00:00+08:00');
      const dow = DAYS[date.getDay()];
      const dateLabel = date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
      const rc = rainClass(d.rain_chance);
      const uvc = uvClass(d.uv_label);

      return `
        <div class="card ${rc}">
          <div>
            <div class="card-date">${dateLabel}</div>
            <div class="card-dow">${dow}</div>
          </div>
          <div class="card-icon">${d.icon || '❓'}</div>
          <div class="card-condition">${d.condition || '—'}</div>
          <div class="card-temps">
            <span class="temp-max">${fmt(d.temp_max, '°')}</span>
            <span class="temp-min">${fmt(d.temp_min, '°')}</span>
          </div>
          <div class="card-stats">
            <div class="stat">
              <span class="stat-label">Rain</span>
              <span class="stat-value rain-pct">${fmt(d.rain_chance, '%')}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Humidity</span>
              <span class="stat-value">${fmt(d.humidity_max, '%')}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Wind</span>
              <span class="stat-value">${fmt(d.wind_speed, ' km/h')} ${d.wind_dir || ''}</span>
            </div>
            <div class="stat">
              <span class="stat-label">UV</span>
              <span class="stat-value ${uvc}">${fmt(d.uv_index, '')} <small>${d.uv_label || ''}</small></span>
            </div>
          </div>
        </div>`;
    }).join('');
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div class="no-data">Could not load forecast.json — workflow may not have run yet.</div>';
    document.getElementById('updated').textContent = '';
  });
</script>
</body>
</html>
